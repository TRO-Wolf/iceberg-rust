version: "3.9"

services:
  moto:
    image: motoserver/moto:5.0.3
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/moto-api/"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    hostname: minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  mc:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 admin password; do sleep 1; done;
      mc mb myminio/warehouse --ignore-existing;
      mc anonymous set public myminio/warehouse;
      echo 'MinIO bucket setup complete';
      tail -f /dev/null
      "

networks:
  default:
    name: iceberg_glue_test
