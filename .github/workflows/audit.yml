name: Security audit

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"

  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"

  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-builder
        with:
          rust-version: stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@0fde6d128a3d980ceac30be8c8b8739abd963b81 # v2.70.0
        with:
          tool: cargo-deny
      # The advisory allowlist (known 0.9.1-era lockfile advisories, dated + justified)
      # lives in deny.toml [advisories] — one source of truth for CI and local runs.
      - name: Check advisories
        run: cargo deny check advisories
